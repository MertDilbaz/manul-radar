name: Manul Sentinel Job Monitor

on:
  workflow_dispatch:
  schedule:
    # Turkey is UTC+3 year-round. 06:00 UTC = 09:00 Europe/Istanbul.
    # Runs Monday-Friday only.
    - cron: "0 6 * * 1-5"

jobs:
  monitor:
    name: Weekday job monitoring
    runs-on: ubuntu-latest

    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Opt-in guard for real Telegram delivery. The runner refuses
      # to call TelegramNotifier.send_message() unless this env var
      # is set to a truthy value. Production CI sets it explicitly
      # here; local checkouts / other CI jobs without it will still
      # run the monitor + persist path but skip notifications.
      MANUL_ENABLE_TELEGRAM_SEND: "true"
      JOB_DB_PATH: data/jobs.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restore job database cache
        uses: actions/cache/restore@v4
        with:
          path: data/jobs.db
          key: manul-job-db-${{ github.run_id }}
          restore-keys: |
            manul-job-db-

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run monitor
        run: python run_monitor.py

      - name: Save job database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: data/jobs.db
          key: manul-job-db-${{ github.run_id }}
